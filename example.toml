# ── Control Center ────────────────────────────────────────────────────────────

# Shortcut buttons shown on the right side of the dashboard (up to 6).
# [[control_center.shortcuts]]
# type = "wifi"
# [[control_center.shortcuts]]
# type = "bluetooth"
# [[control_center.shortcuts]]
